name: Deploy frontend

on:
  push:
    tags:
      - 'frontend'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/var/www/chromatic-matroids
            SERVICE=chromatic-matroids

            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://github.com/raulpenaguiao/chromatic-matroids.git "$DEPLOY_DIR"
              python3 -m venv "$DEPLOY_DIR/.venv"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout main
            git pull origin main

            source .venv/bin/activate
            pip install -e package flask gunicorn numpy --quiet

            sudo tee /etc/systemd/system/$SERVICE.service < "$DEPLOY_DIR/$SERVICE.service" > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE"
            sudo systemctl restart "$SERVICE"
            echo "Deploy complete"
